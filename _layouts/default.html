<!doctype html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/assets/css/site.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Epilogue:wght@400;500&family=Nanum+Gothic+Coding&family=Raleway:wght@700;900&display=swap" rel="stylesheet">
    <title>{{ page.title }}</title>
    {% seo %}
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCNJ72T8D0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCNJ72T8D0');
    </script>
    <!-- Global site tag (gtag.js) - Google Analytics end -->
    <!-- Favicons Begin-->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicons/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/favicons/site.webmanifest">
    <link rel="mask-icon" href="/assets/images/favicons/safari-pinned-tab.svg" color="#2dd4bf">
    <link rel="shortcut icon" href="/assets/images/favicons/favicon.ico">
    <meta name="msapplication-TileColor" content="#0a0e1a">
    <meta name="msapplication-config" content="/assets/images/favicons/browserconfig.xml">
    <meta name="theme-color" content="#0a0e1a">
    <!-- Favicons End-->
</head>
<body class="site-body">
  <!-- Skip-to-content for accessibility -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Navigation bar -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="{% link index.html %}" class="nav-logo" aria-label="Dhananjay's Website — home">
        <span class="nav-logo-bracket">[</span>djay<span class="nav-logo-dot">.</span>lab<span class="nav-logo-bracket">]</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
        Menu
      </button>
      <ul class="nav-links" id="primary-nav" role="list">
        <li><a href="{% link index.html %}" class="nav-link">Home</a></li>
        <li><a href="{% link research.html %}" class="nav-link">Research</a></li>
        <li><a href="{% link blog.html %}" class="nav-link">Blog</a></li>
        <li><a href="{% link about.html %}" class="nav-link">About</a></li>
      </ul>
    </div>
  </nav>
  <!-- end Navigation bar -->

  <div id="main-content" class="page-content">
    {{ content }}
  </div>

  <footer class="site-footer">
    <p class="footer-text">
      &copy; {{ 'now' | date: '%Y' }} Dhananjay Tomar &mdash; Deep Learning Research Notebook
    </p>
  </footer>
  <script>
    (function () {
      var nav = document.querySelector('.site-nav');
      if (!nav) return;
      var button = nav.querySelector('.nav-toggle');
      var links = nav.querySelector('#primary-nav');
      if (!button || !links) return;

      var mobileBreakpoint = 768;
      document.documentElement.classList.add('js-nav');

      function closeMenu() {
        nav.classList.remove('menu-open');
        button.setAttribute('aria-expanded', 'false');
      }

      function openMenu() {
        nav.classList.add('menu-open');
        button.setAttribute('aria-expanded', 'true');
      }

      function isMenuOpen() {
        return nav.classList.contains('menu-open');
      }

      button.addEventListener('click', function () {
        if (isMenuOpen()) closeMenu();
        else openMenu();
      });

      links.addEventListener('click', function (event) {
        if (event.target.closest('a')) closeMenu();
      });

      document.addEventListener('click', function (event) {
        if (!isMenuOpen()) return;
        if (!nav.contains(event.target)) closeMenu();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && isMenuOpen()) {
          closeMenu();
          button.focus();
        }
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth >= mobileBreakpoint) closeMenu();
      });
    })();
  </script>
</body>
</html>
