---
permalink: /blog
layout: default
title: Dhananjay's Blog
image: /assets/images/logo2.jpg
---
<section class="blog-listing" aria-labelledby="blog-heading">
  <h1 class="section-heading" id="blog-heading">All Posts</h1>
  <div class="post-grid">
    {% for post in site.posts %}
    <article class="post-card">
      <a href="{{ post.url }}" class="post-card-img-link" tabindex="-1" aria-hidden="true">
        <div class="post-card-img-wrap">
          <img src="{{ post.image }}" alt="" loading="lazy" class="post-card-img">
        </div>
      </a>
      <div class="post-card-body">
        <time class="post-card-date" datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: '%b %d, %Y' }}
        </time>
        <h2 class="post-card-title">
          <a href="{{ post.url }}" class="post-card-title-link">{{ post.title }}</a>
        </h2>
        <p class="post-card-desc">{{ post.description }}</p>
        <a href="{{ post.url }}" class="post-card-read">Read &rarr;</a>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
