research:
  - year: "2024"
    status: "Published"
    type: "NeurIPS 2024"
    title: "Are nuclear masks all you need for improved out-of-domain generalisation?"
    summary: >-
      Uses nuclear masks during training to steer a cancer classifier toward nuclear shape and
      organisation, while requiring only the original image at inference; improves transfer
      across hospitals and robustness to corruptions and adversarial attacks.
    links:
      - label: "Story"
        url: "/2026/07/19/nuclear-masks-and-domain-generalisation.html"
        internal: true
      - label: "Paper"
        url: "https://arxiv.org/abs/2411.09373"
      - label: "Code"
        url: "https://github.com/undercutspiky/SFL"
      - label: "Talk"
        url: "https://www.youtube.com/watch?v=URq3nibZ4Ts"

  - year: "2017"
    status: "Thesis"
    type: "MSc thesis · IDSIA / USI"
    title: "Curriculum learning and neural-network training dynamics"
    summary: >-
      Tracked examples through training using time-to-learn, loss changes, and computation
      selected by Highway Network gates. The experiments exposed multiple notions of
      difficulty and showed that a batch's effect changes with the model's training state.
    links:
      - label: "Project story"
        url: "/research/curriculum-learning-anns/"
        internal: true
      - label: "Full thesis"
        url: "https://doi.org/10.5281/zenodo.21500749"
      - label: "Code"
        url: "https://github.com/undercutspiky/ACL"

  - year: "2017"
    status: "Poster"
    type: "PASC17"
    title: "Pruning Highway Networks for reducing memory usage"
    summary: >-
      Turned transform gates into pruning signals, reducing a CIFAR-10 Highway Network from
      34 MB to 5.2 MB—about 85% smaller—with a 1.72 percentage-point accuracy drop.
    links:
      - label: "Poster"
        url: "https://pasc17.org/fileadmin/user_upload/pasc17/program/post155s2.pdf"
      - label: "Code & report"
        url: "https://github.com/undercutspiky/CHN"

  - year: "2017"
    status: "Published"
    type: "IEEE conference paper"
    title: "Feature Selection Using Autoencoders"
    summary: >-
      Introduced a feature-selection method that filters uninformative inputs by 
      tracing high-variance connections backwards through an autoencoder; 
      evaluated on five public datasets, including 59% pixel removal on MNIST with 
      roughly a 1% accuracy loss.
    links:
      - label: "IEEE Xplore"
        url: "https://ieeexplore.ieee.org/document/8320259"
      - label: "DOI"
        url: "https://doi.org/10.1109/MLDS.2017.20"

